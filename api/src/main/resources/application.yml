spring:
  application:
    name: lift-lens

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/liftlens}
    username: ${DB_USERNAME:liftlens}
    password: ${DB_PASSWORD:liftlens}

  jpa:
    # Schema is owned by Flyway. Hibernate only validates the mapping against it — never mutates it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.flywaydb: info
