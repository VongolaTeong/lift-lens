server:
  # Bind the platform-provided port in production (Railway/Koyeb inject PORT); 8080 locally.
  port: ${PORT:8080}

spring:
  application:
    name: lift-lens

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/liftlens}
    username: ${DB_USERNAME:liftlens}
    password: ${DB_PASSWORD:liftlens}

  jpa:
    # Schema is owned by Flyway. Hibernate only validates the mapping against it — never mutates it.
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html

liftlens:
  api:
    # Static API token protecting writes (POST/PUT/DELETE /api/**) via the X-API-Token header.
    token: ${API_TOKEN:dev-api-token}
  cors:
    # Browser origins allowed to call the API (the Nuxt frontend). Comma-separated for multiple.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  internal:
    # Shared secret the external cron sends as the X-Internal-Token header to POST /internal/jobs/*.
    token: ${INTERNAL_TOKEN:dev-internal-token}
  # insights.* detector thresholds use code defaults (InsightProperties); override here if needed.

logging:
  level:
    org.flywaydb: info
