services:
  postgres:
    image: postgres:16-alpine
    container_name: liftlens-postgres
    environment:
      POSTGRES_DB: liftlens
      POSTGRES_USER: liftlens
      POSTGRES_PASSWORD: liftlens
    ports:
      - "5432:5432"
    volumes:
      - liftlens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liftlens -d liftlens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  liftlens_pgdata:
